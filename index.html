  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --cyan: #4ee7ff;
      --cyan-dim: rgba(78, 231, 255, 0.08);
      --cyan-glow: rgba(78, 231, 255, 0.15);
      --border: #1a1a1a;
      --muted: #999;
      --faint: #666;
    }

    ::selection {
      background: rgba(78, 231, 255, 0.2);
      color: #fff;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }


    /* Subtle grid bg */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(78, 231, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(78, 231, 255, 0.02) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
    }

    /* Center content */
    .center {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* Logo */
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 32px;
      opacity: 0;
      animation: glow-in 1.5s ease forwards;
      position: relative;
    }
    .logo img {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      filter: none;
      position: relative;
      z-index: 1;
    }
    /* Pulse rings */
    .logo::before,
    .logo::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 20px;
      border: 1px solid rgba(78, 231, 255, 0.15);
      opacity: 0;
      animation: pulse-ring 4s ease-out 2s infinite;
    }
    .logo::after {
      animation-delay: 4s;
    }
    @keyframes pulse-ring {
      0% { opacity: 0; inset: -4px; border-radius: 18px; }
      10% { opacity: 0.4; }
      80% { opacity: 0; }
      100% { opacity: 0; inset: -40px; border-radius: 34px; }
    }

    /* Tagline */
    .tagline {
      margin-top: 24px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Founder line */
    .founder {
      margin-top: 32px;
      font-size: 0.62rem;
      color: var(--faint);
    }
    .founder a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--faint);
      transition: all 0.3s;
    }
    .founder a:hover {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
    }

    /* Page links */
    .pages {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .pages a,
    .pages summary {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 0;
      border-bottom: 1px solid transparent;
      transition: all 0.3s;
      cursor: pointer;
    }
    .pages a:hover,
    .pages summary:hover,
    .pages details[open] > summary {
      color: var(--cyan);
      border-bottom-color: rgba(78, 231, 255, 0.4);
    }
    .pages summary {
      list-style: none;
    }
    .pages summary::-webkit-details-marker {
      display: none;
    }
    .pages details {
      position: relative;
    }
    .pages details:focus-within > summary {
      color: var(--cyan);
      border-bottom-color: rgba(78, 231, 255, 0.4);
    }
    .pages .dropdown {
      position: absolute;
      top: calc(100% + 12px);
      left: 50%;
      z-index: 5;
      transform: translateX(-50%) translateY(-6px);
      min-width: 240px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid rgba(78, 231, 255, 0.18);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .pages details[open] .dropdown,
    .pages details:hover .dropdown,
    .pages details:focus-within .dropdown {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .pages .dropdown a {
      padding: 0;
      text-align: left;
      line-height: 1.5;
      border-bottom: none;
    }
    .pages .dropdown a:hover,
    .pages .dropdown a:focus-visible {
      color: var(--cyan);
    }

    @media (max-width: 640px) {
      .pages {
        gap: 18px;
      }
      .pages .dropdown {
        left: 0;
        transform: translateX(0) translateY(-6px);
        min-width: 220px;
      }
      .pages details[open] .dropdown,
      .pages details:hover .dropdown,
      .pages details:focus-within .dropdown {
        transform: translateX(0) translateY(0);
      }
    }

    /* Animations */
    @keyframes glow-in {
      from { opacity: 0; transform: translateY(8px); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <div class="center">
    <div class="logo">
      <img src="/pragma-cropped.jpg" alt="Pragma" />
    </div>
    <div class="tagline" data-decode data-delay="800">Stealth Company</div>

    <div class="founder">
      <a href="/selected-works/" data-decode data-delay="2000">Bernhard Mueller</a>, <span data-decode data-delay="2200">Chief Hacking Officer</span>
    </div>

    <div class="pages">
      <a href="/selected-works/" data-decode data-delay="1500">Works</a>
      <a href="/starklab/" data-decode data-delay="1600">STARK Lab</a>
      <details>
        <summary data-decode data-delay="1700">OPH</summary>
        <div class="dropdown">
          <a href="https://oph-book.floatingpragma.io/" data-decode data-delay="1750">Reverse Engineering Reality</a>
          <a href="https://challenge.floatingpragma.io/" data-decode data-delay="1800">Disproval Challenge</a>
          <a href="https://floatingpragma.io/oph/" data-decode data-delay="1850">OPH Lab</a>
        </div>
      </details>
      <a href="/awesome-zk-proofs/" data-decode data-delay="1800">ZK Proofs</a>
      <a href="/awesome-ai-security/" data-decode data-delay="1900">AI Security</a>
    </div>
  </div>

  <script>
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?/\\|{}[]<>';
    const navDropdowns = document.querySelectorAll('.pages details');

    document.querySelectorAll('[data-decode]').forEach(el => {
      const final = el.textContent;
      const delay = parseInt(el.dataset.delay) || 0;
      el.textContent = '';

      setTimeout(() => {
        let iteration = 0;
        const interval = setInterval(() => {
          el.textContent = final
            .split('')
            .map((char, i) => {
              if (char === ' ') return ' ';
              if (i < iteration) return final[i];
              return chars[Math.floor(Math.random() * chars.length)];
            })
            .join('');

          if (iteration >= final.length) clearInterval(interval);
          iteration += 1 / 3;
        }, 30);
      }, delay);
    });

    document.addEventListener('click', event => {
      navDropdowns.forEach(dropdown => {
        if (!dropdown.contains(event.target)) {
          dropdown.removeAttribute('open');
        }
      });
    });

    document.addEventListener('keydown', event => {
      if (event.key !== 'Escape') return;

      navDropdowns.forEach(dropdown => {
        if (!dropdown.hasAttribute('open')) return;
        dropdown.removeAttribute('open');
        dropdown.querySelector('summary')?.focus();
      });
    });
  </script>
</body>
</html>
