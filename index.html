  <script>
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?/\\|{}[]<>';

    document.querySelectorAll('[data-decode]').forEach(el => {
      const final = el.textContent;
      const delay = parseInt(el.dataset.delay) || 0;
      el.textContent = '';

      setTimeout(() => {
        let iteration = 0;
        const interval = setInterval(() => {
          el.textContent = final
            .split('')
            .map((char, i) => {
              if (char === ' ') return ' ';
              if (i < iteration) return final[i];
              return chars[Math.floor(Math.random() * chars.length)];
            })
            .join('');

          if (iteration >= final.length) clearInterval(interval);
          iteration += 1 / 3;
        }, 30);
      }, delay);
    });

    document.addEventListener('click', event => {
      const link = event.target.closest('a[data-track-link]');
      if (!link || typeof window.gtag !== 'function') return;

        link_label: link.dataset.trackLink,
        link_text: (link.textContent || '').trim(),
        link_url: link.href,

    });
